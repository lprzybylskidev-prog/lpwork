services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${LPWORK_DEBUGBAR_WS_HOST_PORT:-8082}:8081'
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    depends_on:
      - database
      - mysql
      - redis
      - adminer
      - redis-commander
      - mailpit
      - minio
      - localstack
      - soketi
      - statsd

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -lc "while true; do ./lpwork queue:work --connection=$${LPWORK_QUEUE_WORKER_CONNECTION:-sync} --queue=$${LPWORK_QUEUE_WORKER_QUEUE:-default} --max-jobs=1 --sleep=1 || true; sleep 1; done"
    profiles:
      - queue
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    depends_on:
      - database
      - redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -lc "while true; do ./lpwork schedule:run || true; sleep 60; done"
    profiles:
      - scheduler
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    depends_on:
      - database

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '8080:80'
    volumes:
      - ..:/workspace:cached
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lpwork
      POSTGRES_USER: lpwork
      POSTGRES_PASSWORD: lpwork
    ports:
      - '${LPWORK_POSTGRES_PORT:-54320}:5432'
    volumes:
      - database-data:/var/lib/postgresql/data

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: lpwork
      MYSQL_DATABASE: lpwork
      MYSQL_USER: lpwork
      MYSQL_PASSWORD: lpwork
    ports:
      - '${LPWORK_MYSQL_PORT:-33060}:3306'
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports:
      - '${LPWORK_REDIS_PORT:-63790}:6379'
    volumes:
      - redis-data:/data

  adminer:
    image: adminer:4.8.1
    ports:
      - '${LPWORK_ADMINER_PORT:-18083}:8080'
    depends_on:
      - database
      - mysql

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '${LPWORK_REDIS_COMMANDER_PORT:-18084}:8081'
    depends_on:
      - redis

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '${LPWORK_MAILPIT_SMTP_PORT:-1025}:1025'
      - '${LPWORK_MAILPIT_HTTP_PORT:-8025}:8025'

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lpwork
      MINIO_ROOT_PASSWORD: lpwork-minio
    ports:
      - '${LPWORK_MINIO_API_PORT:-9000}:9000'
      - '${LPWORK_MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: sqs,s3
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - '${LPWORK_LOCALSTACK_PORT:-4566}:4566'
    volumes:
      - localstack-data:/var/lib/localstack
      - ./localstack/ready.d:/etc/localstack/init/ready.d:ro

  soketi:
    image: quay.io/soketi/soketi:1.6-16-alpine
    environment:
      SOKETI_DEFAULT_APP_ID: lpwork
      SOKETI_DEFAULT_APP_KEY: lpwork-key
      SOKETI_DEFAULT_APP_SECRET: lpwork-secret
    ports:
      - '${LPWORK_SOKETI_PORT:-6001}:6001'
      - '${LPWORK_SOKETI_METRICS_PORT:-9601}:9601'

  statsd:
    image: prom/statsd-exporter:v0.26.1
    ports:
      - '${LPWORK_STATSD_PORT:-8125}:9125/udp'
      - '${LPWORK_STATSD_TCP_PORT:-8125}:9125/tcp'
      - '${LPWORK_STATSD_METRICS_PORT:-9102}:9102'

volumes:
  database-data:
  mysql-data:
  redis-data:
  minio-data:
  localstack-data:
