name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  framework:
    name: Framework verification
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: apcu, bcmath, curl, dom, fileinfo, filter, ftp, intl, mbstring, openssl, pcntl, pdo, pdo_mysql, pdo_pgsql, pdo_sqlite, redis, simplexml, sockets, tokenizer, xml, zip
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment
        run: cp .env.example .env

      - name: Run framework tests
        run: php lpwork test:lpwork 2>&1 | tee storage/ci-framework-tests.log

      - name: Run framework checks
        run: php lpwork check 2>&1 | tee storage/ci-framework-check.log

      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: storage/ci-*.log
          if-no-files-found: ignore
